<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfect Neon Heart</title>

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    filter: blur(.4px) contrast(120%);
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const particles = [];
const textParticles = [];

function heart(t){

    const x =
    16 * Math.pow(Math.sin(t),3);

    const y =
    13*Math.cos(t)
    -5*Math.cos(2*t)
    -2*Math.cos(3*t)
    -Math.cos(4*t);

    return {x,y};
}

class Particle{

    constructor(tx,ty){

        this.x =
        Math.random()*canvas.width;

        this.y =
        canvas.height +
        Math.random()*600;

        this.tx = tx;
        this.ty = ty;

        this.vx = 0;
        this.vy = 0;

        this.size =
        Math.random()*0.35 + 0.05;

        this.angle =
        Math.random()*6.28;

        this.speed =
        Math.random()*0.35 + 0.1;

        this.alpha =
        Math.random()*0.5 + 0.5;
    }

    update(){

        const dx =
        this.tx - this.x;

        const dy =
        this.ty - this.y;

        this.vx += dx * 0.0025;
        this.vy += dy * 0.0025;

        this.vx *= 0.975;
        this.vy *= 0.975;

        this.x += this.vx;
        this.y += this.vy;

        this.x +=
        Math.sin(this.angle)
        * this.speed;

        this.y +=
        Math.cos(this.angle)
        * this.speed;

        this.angle += 0.008;
    }

    draw(){

        ctx.beginPath();

        ctx.fillStyle =
        `rgba(255,120,255,${this.alpha})`;

        ctx.shadowColor =
        "#ff00ff";

        ctx.shadowBlur = 70;

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }
}

function createHeart(){

    for(
        let t=0;
        t<Math.PI*2;
        t+=0.001
    ){

        const p = heart(t);

        const x =
        canvas.width/2 +
        p.x * 15;

        const y =
        canvas.height/2 +
        p.y * 15;

        for(let i=0;i<9;i++){

            particles.push(
                new Particle(x,y)
            );
        }
    }
}

function createText(){

    const off =
    document.createElement("canvas");

    const octx =
    off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    octx.fillStyle = "white";

    octx.font =
    "bold 48px Arial";

    octx.textAlign = "center";

    octx.fillText(
        "Te Amo",
        canvas.width/2,
        canvas.height/2 + 150
    );

    const data =
    octx.getImageData(
        0,
        0,
        off.width,
        off.height
    ).data;

    for(let y=0;y<off.height;y+=2){

        for(let x=0;x<off.width;x+=2){

            const index =
            (y*off.width+x)*4;

            if(data[index+3] > 50){

                textParticles.push(
                    new Particle(x,y)
                );
            }
        }
    }
}

createHeart();

setTimeout(()=>{

    createText();

},1500);

function connect(arr){

    for(let a=0;a<arr.length;a++){

        for(let b=a;b<arr.length;b++){

            const dx =
            arr[a].x-arr[b].x;

            const dy =
            arr[a].y-arr[b].y;

            const dist =
            Math.sqrt(dx*dx+dy*dy);

            if(dist < 6){

                ctx.beginPath();

                ctx.strokeStyle =
                "rgba(255,0,255,0.03)";

                ctx.lineWidth = 0.18;

                ctx.moveTo(
                    arr[a].x,
                    arr[a].y
                );

                ctx.lineTo(
                    arr[b].x,
                    arr[b].y
                );

                ctx.stroke();
            }
        }
    }
}

function animate(){

    requestAnimationFrame(animate);

    ctx.fillStyle =
    "rgba(0,0,0,0.008)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(p=>{

        p.update();
        p.draw();
    });

    textParticles.forEach(p=>{

        p.update();
        p.draw();
    });

    connect(particles);
    connect(textParticles);
}

animate();

window.addEventListener("resize",()=>{

    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

</script>

</body>
</html>
